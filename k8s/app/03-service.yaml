# FastAPI 앱 Service
# Service: Pod에 안정적인 네트워크 접근 경로를 제공하는 Kubernetes 리소스
# ClusterIP: 클러스터 내부에서만 접근 가능 (기본 타입)
# → kubectl port-forward 또는 Ingress를 통해 외부에서 접근
apiVersion: v1
kind: Service
metadata:
  name: hospital-api
  namespace: hospital-prediction
  labels:
    app: hospital-api
    # ServiceMonitor가 이 Service를 찾을 때 사용하는 레이블
    service-monitor: "true"
spec:
  selector:
    # 이 Service는 app=hospital-api 레이블을 가진 Pod에 트래픽을 전달
    app: hospital-api
  ports:
    - name: http
      port: 80           # Service에서 노출하는 포트
      targetPort: 8000   # Pod(컨테이너)의 실제 포트
      protocol: TCP
  type: ClusterIP

# FastAPI 앱 Deployment
# Deployment: Pod(컨테이너 실행 단위)를 선언적으로 관리하는 Kubernetes 리소스
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-api
  namespace: hospital-prediction
  labels:
    app: hospital-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hospital-api
  template:
    metadata:
      labels:
        app: hospital-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: hospital-api
          # 로컬 레지스트리에서 이미지 풀
          # host.docker.internal: Kubernetes 노드에서 macOS 호스트를 가리키는 DNS
          # 5001 포트로 실행 중인 로컬 registry:2 컨테이너에서 이미지를 가져옴
          image: host.docker.internal:5001/hospital-api:latest
          # IfNotPresent: 노드에 이미지가 없을 때만 풀 (한 번 풀면 캐시 사용)
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: MODEL_PATH
              value: "models/best_model.pkl"
            - name: PYTHONUNBUFFERED
              value: "1"
          # 헬스체크: 컨테이너가 준비됐는지 확인 (실패 시 트래픽 차단)
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          # 생존 확인: 컨테이너가 살아있는지 확인 (실패 시 재시작)
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          # 리소스 제한: 과도한 리소스 사용 방지
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # 모델 파일은 Docker 이미지 빌드 시 COPY models/ ./models/ 로 포함됨
          # 모델을 교체하려면 이미지를 재빌드하고 Deployment를 롤아웃합니다:
          #   docker build -t host.docker.internal:5001/hospital-api:latest .
          #   docker push host.docker.internal:5001/hospital-api:latest
          #   kubectl rollout restart deployment/hospital-api -n hospital-prediction
